name: CD

on:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
      - name: Update version in pyproject.toml
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
      - name: Commit version bump
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git diff --cached --quiet || git commit -m "chore: bump version to $VERSION"
          git push origin HEAD:master
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          sparse-checkout: docker-compose.yml
          sparse-checkout-cone-mode: false
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.PI_TAILSCALE_IP }}
          username: ${{ secrets.PI_SSH_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          port: ${{ secrets.PI_SSH_PORT }}
          source: "docker-compose.yml"
          target: "~/sungsimdangbot"
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_TAILSCALE_IP }}
          username: ${{ secrets.PI_SSH_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          port: ${{ secrets.PI_SSH_PORT }}
          script: |
            cd ~/sungsimdangbot
            cat > .env << 'EOF'
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            KAKAO_TOKEN=${{ secrets.KAKAO_TOKEN }}
            WEATHER_TOKEN=${{ secrets.WEATHER_TOKEN }}
            SEOUL_HANGANG_WATER_TOKEN=${{ secrets.SEOUL_HANGANG_WATER_TOKEN }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            ADMIN_USER_ID=${{ secrets.ADMIN_USER_ID }}
            RSSF_TOKEN=${{ secrets.RSSF_TOKEN }}
            RSSF_URL=${{ secrets.RSSF_URL }}
            EOF
            mkdir -p ~/sungsimdangbot/data
            docker compose pull
            docker compose up -d
