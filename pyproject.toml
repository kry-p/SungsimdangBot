[project]
name = "sungsimdangbot"
version = "1.0.0"
description = "Telegram bot with various utility features"
requires-python = ">=3.9"
dependencies = [
    "pyTelegramBotAPI",
    "requests",
    "python-dotenv",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "pytest",
    "pre-commit",
]

[tool.setuptools]
py-modules = []

[tool.ruff]
line-length = 120
exclude = [".venv", "__pycache__", ".git"]

[tool.ruff.lint]
# N816: resources/strings.py의 camelCase 모듈 변수 허용
ignore = ["N816"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
